name: Deploy to Vercel
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build odbywa sie na Vercel (vercel-action bez --prebuilt), wiec zmienne
      # NEXT_PUBLIC_* z ustawien projektu Vercel sa dostepne podczas builda.
      # --prod wrzuca deploy na produkcje, a nie tylko na Preview.
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: '--prod'
          working-directory: .